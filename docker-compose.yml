services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  api:
    build:
      context: ./src/CookieCorner.Api
      dockerfile: Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      Redis__ConnectionString: redis:6379,abortConnect=false
    depends_on:
      - redis
    ports:
      - "8080:8080"
    volumes:
      - ./src/CookieCorner.Api/appsettings.Local.json:/app/appsettings.Local.json:ro

  web:
    build:
      context: ./src/cookiecorner-web
      dockerfile: Dockerfile
    depends_on:
      - api
    environment:
      API_BASE_URL: http://api:8080
    ports:
      - "3000:3000"
